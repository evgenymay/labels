<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Новая вкладка</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Единая сетка на весь экран */
    #grid {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: grid;
      overflow: hidden;
      z-index: 1;
    }

    /* Поисковая форма – поверх сетки */
    .search-form {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 50vw;
      max-width: 700px;
      z-index: 10;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    #search-engine {
      padding: 13px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 28px;
      font-size: 15px;
      font-family: inherit;
      background: white;
      color: #1e293b;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      appearance: none;
      -webkit-appearance: none;
      text-align: center;
    }
    #search-engine:focus {
      border-color: #93c5fd;
      box-shadow: 0 1px 12px rgba(59,130,246,0.18);
    }
    .search-input {
      width: 100%;
      padding: 14px 22px;
      font-size: 17px;
      font-family: inherit;
      border: 1px solid #cbd5e1;
      border-radius: 28px;
      outline: none;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
      background: white;
    }
    .search-input:focus {
      border-color: #93c5fd;
      box-shadow: 0 1px 12px rgba(59,130,246,0.18);
    }
    .search-input.has-suggestions {
      border-radius: 20px 20px 0 0;
      border-bottom-color: transparent;
    }

    /* Подсказки */
    #suggestions {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: white;
      border: 1px solid #93c5fd;
      border-top: none;
      border-radius: 0 0 20px 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.08);
      overflow: hidden;
      z-index: 11;
    }
    #suggestions.visible { display: block; }
    .suggestion-item {
      padding: 10px 22px;
      font-size: 15px;
      cursor: pointer;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .suggestion-item:hover,
    .suggestion-item.active {
      background: #f1f5f9;
    }
    .suggestion-item::before {
      content: '🔍';
      font-size: 12px;
      opacity: 0.4;
      flex-shrink: 0;
    }

    /* Ячейки сетки */
    .grid-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      transition: background 0.1s;
    }
    .grid-cell.drag-over {
      background: rgba(59, 130, 246, 0.12);
    }
    .grid-cell .cell {
      width: 88%;
      height: 88%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid #ccc;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      cursor: grab;
      user-select: none;
      background: white;
    }
    .grid-cell .cell:active { cursor: grabbing; }
    .grid-cell .cell img {
      width: 60%;
      height: 60%;
      object-fit: contain;
      pointer-events: none;
    }
    .grid-cell .cell.dragging {
      opacity: 0.4;
    }
    @keyframes duplicateHit {
      0% {
        border-color: #22d3ee;
        transform: scale(1);
        box-shadow:
          0 0 0 0 rgba(34, 211, 238, 0.0),
          0 0 0 0 rgba(34, 211, 238, 0.0),
          0 0 0 rgba(34, 211, 238, 0.0);
      }
      20% {
        border-color: #22d3ee;
        transform: scale(1.055);
        box-shadow:
          0 0 0 3px rgba(34, 211, 238, 1),
          0 0 0 8px rgba(34, 211, 238, 0.35),
          0 0 22px rgba(34, 211, 238, 0.55);
      }
      78% {
        border-color: #22d3ee;
        transform: scale(1.055);
        box-shadow:
          0 0 0 3px rgba(34, 211, 238, 1),
          0 0 0 8px rgba(34, 211, 238, 0.35),
          0 0 22px rgba(34, 211, 238, 0.55);
      }
      100% {
        border-color: #ccc;
        transform: scale(1);
        box-shadow:
          0 0 0 0 rgba(34, 211, 238, 0.0),
          0 0 0 0 rgba(34, 211, 238, 0.0),
          0 0 0 rgba(34, 211, 238, 0.0);
      }
    }
    .grid-cell .cell.duplicate-hit {
      border-color: #22d3ee;
      animation: duplicateHit 2s ease-in-out 1;
      will-change: box-shadow, border-color, transform;
    }

    /* Кнопка настроек */
    #settings-trigger {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #e2e8f0;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #64748b;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: background 0.15s;
    }
    #settings-trigger:hover { background: #cbd5e1; }

    /* Панель настроек */
    #settings-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 340px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13);
      z-index: 200;
      display: none;
      flex-direction: column;
      max-height: calc(100vh - 24px);
      overflow: hidden;
    }
    #settings-panel.open { display: flex; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
      flex-shrink: 0;
    }
    .panel-header h3 {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      flex: 1;
      text-align: center;
    }
    #panel-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: #94a3b8;
      padding: 2px 4px;
      line-height: 1;
    }
    #panel-close:hover { color: #475569; }

    .panel-settings {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 16px;
      flex-shrink: 0;
      border-bottom: 1px solid #e2e8f0;
    }
    .setting-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .setting-label {
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      text-align: center;
    }
    .setting-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .setting-controls input[type=range] {
      flex: 1;
      height: 4px;
      accent-color: #3b82f6;
      cursor: pointer;
      margin: 0;
    }
    .setting-controls input[type=number] {
      width: 52px;
      padding: 4px 6px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      text-align: center;
      -moz-appearance: textfield;
      flex-shrink: 0;
    }
    .setting-controls input[type=number]::-webkit-inner-spin-button,
    .setting-controls input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .panel-settings button {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 2px;
    }
    .panel-settings button:hover:not(:disabled) { background: #2563eb; }
    .panel-settings button:disabled { background: #94a3b8; cursor: default; }
    .profile-select-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 2px;
    }
    .profile-select-wrap .profile-select-box {
      flex: 1;
      min-width: 0;
    }
    .profile-select-wrap select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: white;
      color: #1e293b;
      outline: none;
    }
    .profile-select-wrap select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .profile-select-wrap .profile-action-btn {
      width: auto !important;
      min-width: 88px;
      padding: 8px 10px;
      font-size: 12px;
      margin-top: 0;
      margin-left: auto;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: center;
    }
    
    /* Стиль для информационной надписи "Выбрать метки" (как заголовок) */
    .panel-label {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      text-align: center;
      padding: 8px 0 4px;
      border-top: 1px solid #e2e8f0;
      margin-top: 8px;
    }

    /* Попап сохранения профиля */
    .profile-popup {
      position: absolute;
      top: -32px;
      left: 0;
      right: 0;
      background: #f1f5f9;
      border: 1px solid #000;
      border-radius: 10px;
      padding: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .profile-popup.open { opacity: 1; pointer-events: auto; }
    .confirm-btn { transition: background 0.3s ease; }
    .confirm-btn.saved { background: #86efac !important; color: #16a34a !important; }
    .profile-popup .popup-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: #e2e8f0;
      color: #334155;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .profile-popup .popup-close:hover { background: #cbd5e1; }
    .profile-popup h3 {
      font-size: 15px;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 10px;
      text-align: center;
    }
    .profile-popup .input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .profile-popup input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .profile-popup input[type="text"]:focus { border-color: #3b82f6; }
    .profile-popup .confirm-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: #fef08a;
      color: #16a34a;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .profile-popup .input-row .confirm-btn {
      align-self: center;
    }
    .profile-popup .confirm-btn:hover:not(:disabled) { background: #fde047; }
    .profile-popup .confirm-btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: default; }

    /* Контекстное меню профилей */
    #profile-context-menu {
      position: fixed;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.13);
      z-index: 500;
      display: none;
      min-width: 150px;
      overflow: hidden;
      padding: 4px 0;
    }
    #profile-context-menu.open { display: block; }
    .ctx-item {
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      color: #1e293b;
      user-select: none;
    }
    .ctx-item:hover { background: #f1f5f9; }
    .ctx-item.danger { color: #dc2626; }
    .ctx-item.disabled { color: #94a3b8; pointer-events: none; }
    .ctx-divider { height: 1px; background: #e2e8f0; margin: 4px 0; }

    .table-wrapper {
      overflow-y: auto;
      flex: 1;
      min-height: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }
    th, td {
      text-align: left;
      padding: 5px 8px;
      border-bottom: 1px solid #e2e8f0;
    }
    th:first-child, td:first-child { text-align: center; width: 34px; padding-left: 4px; }
    th:nth-child(2), td:nth-child(2) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
    th:last-child, td:last-child { text-align: right; width: 44px; padding-right: 8px; }
    tr:hover { background: #f8fafc; }
  </style>
</head>
<body>
  <div id="grid"></div>

  <form class="search-form" action="https://www.google.com/search" method="GET" id="search-form">
    <div class="search-input-wrap">
      <input class="search-input" type="text" name="q" placeholder="Поиск в Google…" autofocus autocomplete="off" id="search-input">
      <div id="suggestions"></div>
    </div>
    <select id="search-engine">
      <option value="google">Google</option>
      <option value="yandex">Яндекс</option>
    </select>
  </form>

  <button id="settings-trigger">⋯</button>

  <div id="settings-panel">
    <div class="panel-header">
      <h3>Настройки</h3>
      <button id="panel-close">✕</button>
    </div>
    <div class="panel-settings">
      <div class="setting-row">
        <div class="setting-label">учитывать дней</div>
        <div class="setting-controls">
          <input type="range" id="days" min="1" max="365" value="90">
          <input type="number" id="days-num" min="1" max="365" value="90">
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">количество меток</div>
        <div class="setting-controls">
          <input type="range" id="top" min="0" max="100" value="14">
          <input type="number" id="top-num" min="0" max="100" value="14">
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">ширина меток (%)</div>
        <div class="setting-controls">
          <input type="range" id="iconw" min="5" max="20" value="7">
          <input type="number" id="iconw-num" min="5" max="20" value="7">
        </div>
      </div>
      <div class="setting-row">
        <div class="setting-label">меток в ряду</div>
        <div class="setting-controls">
          <input type="range" id="cols" min="1" max="20" value="7">
          <input type="number" id="cols-num" min="1" max="20" value="7">
        </div>
      </div>
      <div style="position:relative">
        <select id="profile-select" style="width:100%;padding:9px 12px;border:1px solid #cbd5e1;border-radius:10px;font-size:14px;font-family:inherit;background:white;color:#1e293b;outline:none;cursor:pointer">
          <option value="__default__">По умолчанию</option>
        </select>
        <div class="profile-popup" id="profile-popup-overlay">
          <button class="popup-close" id="profile-close-btn">&#10005;</button>
          <h3 id="profile-popup-title">Имя профиля</h3>
          <div class="input-row">
            <input type="text" id="profile-name-input" autocomplete="off">
            <button class="confirm-btn" id="profile-confirm-btn">&#10003;</button>
          </div>
        </div>
      </div>
      <input type="file" id="import-file-input" accept=".json" style="display:none">
    </div>
    <div class="table-wrapper">
      <div id="output"></div>
    </div>
  </div>

  <div id="profile-context-menu">
    <div id="ctx-normal">
      <div class="ctx-item" id="ctx-rename">Переименовать</div>
      <div class="ctx-divider"></div>
      <div class="ctx-item" id="ctx-export">Экспорт</div>
      <div class="ctx-item" id="ctx-import">Импорт</div>
      <div class="ctx-divider"></div>
      <div class="ctx-item danger" id="ctx-delete">Удалить</div>
    </div>
    <div id="ctx-confirm" style="display:none;padding:10px 14px">
      <div style="font-size:13px;color:#1e293b;margin-bottom:8px;text-align:center">Удалить профиль?</div>
      <div style="display:flex;gap:8px">
        <button id="ctx-confirm-yes" style="flex:1;padding:6px;background:#dc2626;color:white;border:none;border-radius:8px;font-size:13px;cursor:pointer">Да</button>
        <button id="ctx-confirm-no" style="flex:1;padding:6px;background:#e2e8f0;color:#1e293b;border:none;border-radius:8px;font-size:13px;cursor:pointer">Нет</button>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
